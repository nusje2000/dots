set -g @plugin 'tmux-plugins/tpm'
set -g @plugin '2kabhishek/tmux2k'

# Set the prefix to Ctrl+a
set -g prefix C-a
set -s escape-time 0
set -g status-interval 5
set -g default-terminal "xterm-256color"

set -g @tmux2k-icons-only false

set -g @tmux2k-theme 'default'
set -g @tmux2k-left-sep "\ue0b8"
set -g @tmux2k-right-sep "\ue0ba"

set -g @tmux2k-red '#ff5189'
set -g @tmux2k-purple '#cf87e8'
set -g @tmux2k-blue '#80a0ff'

set -g @tmux2k-bg-main 'default'
set -g @tmux2k-network-colors 'red black'
set -g @tmux2k-cpu-colors 'purple black'
set -g @tmux2k-ram-colors 'blue black'
set -g @tmux2k-battery-colors 'purple black'
set -g @tmux2k-git-colors 'red black'

set -g @tmux2k-left-plugins "network cpu ram"
set -g @tmux2k-right-plugins "battery git"

set -g @tmux2k-military-time false

# Remove the old prefix
unbind C-b

# Send Ctrl+a to applications by pressing it twice
bind C-a send-prefix
run '~/.tmux/plugins/tpm/tpm'
